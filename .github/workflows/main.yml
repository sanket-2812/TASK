name: CI/CD Pipeline

on:
  push:
    branches: [ "feature" ]
  pull_request:

env:
  FRONTEND_IMAGE_NAME: frontend
  BACKEND_IMAGE_NAME: backend
  TRIVY_THRESHOLD: 40

jobs:
  build-and-scan:
    name: Build and Scan Docker Images on PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        run: docker build -t ${{ env.BACKEND_IMAGE_NAME }} ./backend

      - name: Build Frontend Image
        run: docker build -t ${{ env.FRONTEND_IMAGE_NAME }} ./frontend

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Scan Backend with Trivy
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy \
            image --severity CRITICAL --quiet --format json ${{ env.BACKEND_IMAGE_NAME }} > backend-trivy.json

      - name: Scan Frontend with Trivy
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy \
            image --severity CRITICAL --quiet --format json ${{ env.FRONTEND_IMAGE_NAME }} > frontend-trivy.json

      - name: Evaluate Vulnerabilities
        run: |
          backend_crit=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' backend-trivy.json)
          frontend_crit=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' frontend-trivy.json)
          total=$((backend_crit + frontend_crit))
          echo "Backend CRITICAL: $backend_crit"
          echo "Frontend CRITICAL: $frontend_crit"
          echo "Total CRITICAL: $total"

          if [ "$total" -gt "${{ env.TRIVY_THRESHOLD }}" ]; then
            echo "❌ Vulnerability threshold exceeded ($total > ${{ env.TRIVY_THRESHOLD }})"
            exit 1
          else
            echo "✅ Vulnerabilities within acceptable threshold"
          fi

  deploy-to-ecr:
    name: Push Docker Images to ECR on Merge
    if: github.ref == 'refs/heads/feature' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
          docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      - name: Build and Tag Backend Image
        run: |
          docker build -t ${{ env.BACKEND_IMAGE_NAME }} ./backend
          docker tag ${{ env.BACKEND_IMAGE_NAME }}:latest \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPO_NAME }}:backend-latest

      - name: Build and Tag Frontend Image
        run: |
          docker build -t ${{ env.FRONTEND_IMAGE_NAME }} ./frontend
          docker tag ${{ env.FRONTEND_IMAGE_NAME }}:latest \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPO_NAME }}:frontend-latest

      - name: Push Backend to ECR
        run: |
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPO_NAME }}:backend-latest

      - name: Push Frontend to ECR
        run: |
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPO_NAME }}:frontend-latest
