name: CI/CD Pipeline

on:
  push:
    branches: [ "feature" ]
  pull_request:

env:
  TRIVY_THRESHOLD: 40
  FRONTEND_IMAGE_NAME: frontend
  BACKEND_IMAGE_NAME: backend

jobs:
  build-and-scan:
    name: Build & Scan Docker Images
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          tags: ${{ env.BACKEND_IMAGE_NAME }}:latest
          load: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          tags: ${{ env.FRONTEND_IMAGE_NAME }}:latest
          load: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new

      - name: Move new Docker cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Scan Backend with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.BACKEND_IMAGE_NAME }}:latest
          format: table
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Scan Frontend with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FRONTEND_IMAGE_NAME }}:latest
          format: table
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true

  deploy-to-eks:
    name: Build, Push & Deploy to EKS
    if: github.ref == 'refs/heads/feature' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    env:
      RAW_TAG: ${{ github.event.head_commit.message }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sanitize Commit Message to Use as Tag
        id: tag
        run: |
          CLEAN_TAG=$(echo "${{ env.RAW_TAG }}" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -cd 'a-z0-9\-')
          echo "Cleaned Tag: $CLEAN_TAG"
          echo "IMAGE_TAG=$CLEAN_TAG" >> $GITHUB_ENV

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
          docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPO_NAME }}:backend-${{ env.IMAGE_TAG }}

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPO_NAME }}:frontend-${{ env.IMAGE_TAG }}

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > ~/.kube/config

      - name: Deploy Backend with Helm
        run: |
          helm upgrade --install backend ./backend \
            --namespace default \
            --set image.repository=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPO_NAME }} \
            --set image.tag=backend-${{ env.IMAGE_TAG }}

      - name: Deploy Frontend with Helm
        run: |
          helm upgrade --install frontend ./frontend \
            --namespace default \
            --set image.repository=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPO_NAME }} \
            --set image.tag=frontend-${{ env.IMAGE_TAG }}
