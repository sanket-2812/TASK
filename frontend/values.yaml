replicaCount: 1

image:
  repository: ""   # 🔧 Replace with your frontend image repo
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP     # ✅ ALB needs internal ClusterIP, not LoadBalancer
  port: 80
  targetPort: 80
serviceAccount:
  create: false

ingress:
  enabled: false     # ❌ Disable Helm-managed ingress (using shared ALB YAML)

# TLS handled by external Ingress, not Helm
# This section is removed

autoscaling:
  enabled: false
