replicaCount: 1

image:
  repository: ""   # 🔧 Replace with your frontend image repo
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: LoadBalancer   # ✅ You still want this to be externally exposed
  port: 80

serviceAccount:
  create: false

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: app.sanketsarode.shop    # ✅ Correct subdomain
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: frontend-sanket-tls
      hosts:
        - app.sanketsarode.shop

autoscaling:
  enabled: false
