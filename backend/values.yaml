replicaCount: 1

image:
  repository: ""   # Set your backend image repository (e.g., <your-ecr-repo>)
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP     # ✅ Using ClusterIP for internal service
  port: 3000

serviceAccount:
  create: false

ingress:
  enabled: true
  className: "nginx"   # or leave null if default
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      location ^~ /.well-known/acme-challenge/ {
        allow all;
      }
  hosts:
    - host: backend.sanketsarode.shop
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: backend-sanket-tls
      hosts:
        - backend.sanketsarode.shop

autoscaling:
  enabled: false
